<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anh xin lỗi bé!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f7;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #mainContainer img {
            width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d32f2f;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #noBtn {
            background-color: #9e9e9e;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            position: absolute;
            transition: 0.1s;
        }

        #successContent {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #successContent h2 {
            color: #ff4d6d;
            font-size: 28px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="mainContainer">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1ZjR4bmY0bmh1ZzRyeG5ybmxyeG5ybmxyeG5ybmxyeG5yJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v6aOebdEG8wN7koEwv/giphy.gif" alt="Cute Bear">
        <h1>Anh xin lỗi bé, anh sai rồi bé cho anh xin lỗi nhá</h1>

        <div class="btn-group">
            <button id="yesBtn" onclick="handleYes()">Có</button>
            <button id="noBtn" onmouseover="moveNoButton()">Không</button>
        </div>
    </div>

    <div id="successContent">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ0ZzR3eW14bmF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/KztT2c4u8mYYUiCiY6/giphy.gif" width="250">
        <h2>Dạ, cảm ơn em đã tha lỗi cho anh, yêu ạ ❤️</h2>
    </div>

    <script>
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');

            // 1. Nút "Không" nhảy đi chỗ khác
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // 2. Nút "Có" to lên gấp 1.5 lần (Theo logic ảnh mẫu)
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = `${currentSize * 1.5}px`;
            yesBtn.style.padding = `${(currentSize * 1.5) / 2}px ${currentSize * 1.5}px`;
        }

        function handleYes() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('successContent').style.display = 'flex';
        }
    </script>
</body>
</html>
