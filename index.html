<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Bé Yêu</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f7;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Container chính */
        #mainContainer { text-align: center; }

        .gif-container img {
            width: 230px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d32f2f;
            font-size: 24px;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        /* Nút Có */
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Nút Không - Phải có position: absolute để nhảy được */
        #noBtn {
            background-color: #9e9e9e;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            position: absolute; 
            transition: 0.1s;
        }

        /* Màn hình thành công */
        #successContent {
            display: none;
            text-align: center;
        }

        #successContent h2 {
            color: #ff4d6d;
            font-size: 28px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="mainContainer">
        <div class="gif-container">
            <img id="bearImg" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ0ZzR3eW14bmF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/KztT2c4u8mYYUiCiY6/giphy.gif" alt="Cute Bear">
        </div>
        
        <h1>Anh xin lỗi bé, anh sai rồi bé cho anh xin lỗi nhá</h1>

        <div class="btn-group">
            <button id="yesBtn" onclick="handleYesClick()">Có</button>
            <button id="noBtn" onmouseover="handleNoHover()">Không</button>
        </div>
    </div>

    <div id="successContent">
        <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZ0ZzR3eW14bmF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v6aOebdEG8wN7koEwv/giphy.gif" width="250">
        <h2>Dạ, cảm ơn em đã tha lỗi cho anh, yêu ạ ❤️</h2>
    </div>

    <script>
        function handleNoHover() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');

            // 1. Nút "Không" nhảy vị trí ngẫu nhiên
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // 2. Logic tăng size nút "Có" x1.5 như trong ảnh của bạn
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = `${currentSize * 1.5}px`;
            yesBtn.style.padding = `${(currentSize * 1.5)/2}px ${currentSize * 1.5}px`;
        }

        function handleYesClick() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('successContent').style.display = 'block';
        }
    </script>
</body>
</html>
